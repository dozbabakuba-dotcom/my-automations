name: eidas.tools weekly audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run audit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EIDAS_AUDIT_PASSWORD: ${{ secrets.EIDAS_AUDIT_PASSWORD }}
          EIDAS_AUDIT_MODEL: ${{ vars.EIDAS_AUDIT_MODEL || 'gpt-5-mini' }}
          EIDAS_AUDIT_URL: https://eidas.tools
          EIDAS_AUDIT_REPORT_DIR: reports/eidas-tools
        run: python run.py run eidas-weekly-audit

      - name: Commit report
        run: |
          if [ -z "$(git status --porcelain reports/eidas-tools)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/eidas-tools
          git commit -m "Add weekly eidas.tools audit report"
          git push
